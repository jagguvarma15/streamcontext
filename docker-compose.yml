# streamcontext local stack: Kafka (KRaft, no Zookeeper) + Schema Registry + Qdrant.
#
#   docker compose up -d
#   python examples/producer.py        # synthesizes Avro orders into the `orders` topic
#   open http://localhost:6333/dashboard  # inspect Qdrant
#
# Volumes are persisted under ./.data/ so a `down` doesn't blow away state. Add `-v` to nuke them.
#
# Ports are bound to 127.0.0.1 by default — none of these services run with auth, so we
# never want them on the LAN. Override with SC_HOST_BIND=0.0.0.0 if you knowingly want to
# expose them (e.g., from a VM to its host).

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: sc-kafka
    ports:
      - "${SC_HOST_BIND:-127.0.0.1}:9092:9092"   # external listener for clients on the host
      - "${SC_HOST_BIND:-127.0.0.1}:9094:9094"   # internal listener for other compose services
    environment:
      # KRaft single-node setup
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://kafka:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - ./.data/kafka:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: sc-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${SC_HOST_BIND:-127.0.0.1}:8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9094
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: sc-qdrant
    ports:
      - "${SC_HOST_BIND:-127.0.0.1}:6333:6333"   # REST + dashboard
      - "${SC_HOST_BIND:-127.0.0.1}:6334:6334"   # gRPC
    volumes:
      - ./.data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333; echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n1 <&3 | grep -q 200'"]
      interval: 10s
      timeout: 5s
      retries: 12

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sc-gateway
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      SC_KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      SC_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SC_QDRANT_URL: http://qdrant:6333
      SC_KAFKA_TOPICS: ${SC_KAFKA_TOPICS:-orders}
      SC_KAFKA_GROUP_ID: ${SC_KAFKA_GROUP_ID:-streamcontext-gateway}
      SC_KAFKA_AUTO_OFFSET_RESET: ${SC_KAFKA_AUTO_OFFSET_RESET:-earliest}
      SC_EMBEDDER_PROVIDER: ${SC_EMBEDDER_PROVIDER:-local}
      SC_EMBEDDER_MODEL: ${SC_EMBEDDER_MODEL:-all-MiniLM-L6-v2}
      SC_QDRANT_COLLECTION: ${SC_QDRANT_COLLECTION:-streamcontext}
      SC_QDRANT_VECTOR_DIM: ${SC_QDRANT_VECTOR_DIM:-384}
      SC_BATCH_SIZE: ${SC_BATCH_SIZE:-32}
      SC_BATCH_FLUSH_INTERVAL_SEC: ${SC_BATCH_FLUSH_INTERVAL_SEC:-1.0}
      SC_LOG_LEVEL: ${SC_LOG_LEVEL:-INFO}
      SC_LOG_JSON: ${SC_LOG_JSON:-true}
    volumes:
      # Cache HF model weights across restarts so cold start is fast.
      - ./.data/hf-cache:/home/streamcontext/.cache
    healthcheck:
      # Process-alive check until the gateway exposes /health (Day 5).
      # The image installs procps for pgrep in the runtime stage.
      test: ["CMD-SHELL", "pgrep -f 'streamcontext.main' >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 60s
    restart: unless-stopped
